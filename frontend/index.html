<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library App - Register</title>
</head>
<body>
    <h2>Create an Account</h2>
    <form id="registerForm">
        <input type="text" id="name" placeholder="Full Name" required><br><br>
        <input type="email" id="email" placeholder="Email Address" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <button type="submit">Register</button>
    </form>

    <p id="message"></p>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop page reload

            // 1. Grab values from inputs
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // 2. Send data to your working backend API port 5000
            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();
                
                // 3. Display the backend's response message on the screen!
                document.getElementById('message').innerText = data.message;
            } catch (error) {
                document.getElementById('message').innerText = "Frontend error connecting to server.";
            }
        });
    </script>
</body>
</html>
