<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library App - Login</title>
</head>
<body>
    <h2>Login to Your Account</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email Address" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <button type="submit">Login</button>
    </form>

    <p id="message" style="color: blue;"></p>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    // Save the JWT token into browser storage
                    localStorage.setItem('token', data.token);
                    document.getElementById('message').innerText = "Login successful! Redirecting...";
                    
                    // --- THE REDIRECT ROUTE IS NOW LOADED RIGHT HERE ---
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('message').innerText = data.message;
                }
            } catch (error) {
                document.getElementById('message').innerText = "Error connecting to server.";
            }
        });
    </script>
</body>
</html>
